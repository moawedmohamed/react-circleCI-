version: 2.1

jobs:
  deploy:
    docker:
        - image: cimg/node:22.19.0
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: |
              corepack enable
              corepack prepare pnpm@latest --activate
      - run:
          name: Set pnpm store path
          command: pnpm config set store-dir ~/.pnpm-store
      - restore_cache:
          keys:
            - v3-dependence-{{ checksum "pnpm-lock.yaml" }}
            - v3-dependence-
      - run:
          name: install dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          paths:
            - ~/.pnpm-store
          key: v3-dependence-{{ checksum "pnpm-lock.yaml" }}
      - run:
          name: Run Tests
          command: pnpm run test
      - run:
          name: Build
          command: pnpm run build
      - run:
          name: Deploy at netlify
          command: pnpm run deploy


workflows:
  build_deploy:
    jobs:
      - deploy